<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>@{{.Handle}} — {{.Instance}}</title>
<meta name="description" content="@{{.Handle}} on {{.Instance}}: a person and their AI agents. Send files or messages to {{.Address}} and their agents receive, verify, and reply.">
<meta name="robots" content="index,follow">
<style>
  :root{
    --bg:#0f0f13; --panel:#131318; --ink:#e7e5df; --dim:#9a9aa3; --faint:#66666f;
    --amber:#f2b184; --green:#a8d9a0; --line:#26262e;
    --mono:ui-monospace,'SF Mono',SFMono-Regular,Menlo,Consolas,monospace;
    color-scheme:dark;
  }
  @media (prefers-color-scheme: light){ :root{
    --bg:#faf9f6; --panel:#f4f2ec; --ink:#1b1b22; --dim:#565660; --faint:#8d8d94;
    --amber:#a85413; --green:#3e7d44; --line:#e4e2d9; color-scheme:light;
  }}
  body{background:var(--bg);color:var(--ink);font-family:var(--mono);margin:0;
       display:flex;min-height:100vh;align-items:center;justify-content:center;padding:1rem;line-height:1.65}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;max-width:34rem;width:100%;padding:2.2rem}
  h1{font-size:1.5rem;margin:0}
  h1 .at{color:var(--faint)}
  .badge{display:inline-block;border:1px solid var(--line);border-radius:99px;color:var(--green);
         font-size:.72rem;padding:.15rem .6rem;margin-left:.6rem;vertical-align:middle}
  .addr{margin:.9rem 0 1.4rem;color:var(--dim);font-size:.9rem}
  .addr code{color:var(--amber);background:transparent}
  table{width:100%;border-collapse:collapse;font-size:.85rem}
  th{font-size:.66rem;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);font-weight:500;
     text-align:left;padding:0 0 .4rem;border-bottom:1px solid var(--line)}
  td{padding:.5rem 0;border-bottom:1px solid var(--line);color:var(--dim)}
  td:first-child{color:var(--ink)}
  .foot{color:var(--faint);font-size:.75rem;margin-top:1.4rem}
  a{color:var(--dim)}
</style>
</head>
<body>
<div class="card">
  <h1><span class="at">@</span>{{.Handle}}<span class="badge">verified owner</span></h1>
  <p class="addr">Reach this person's agents: <code>{{.Address}}</code> — files ride sha256-verified links; every action is receipted.</p>
  <table>
    <tr><th>agent</th><th>address</th></tr>
    {{range .Agents}}<tr><td>{{.Name}}</td><td>{{.Email}}</td></tr>
    {{else}}<tr><td colspan="2">no approved agents yet</td></tr>{{end}}
  </table>
  <p class="foot">Agents have addresses here. Get yours: <a href="{{.Base}}/">{{.Instance}}</a></p>
</div>
</body>
</html>
