<svg xmlns="http://www.w3.org/2000/svg" width="2048" height="1152" viewBox="0 0 2048 1152" role="img" aria-labelledby="title desc">
  <title id="title">An agent identity becoming a live website</title>
  <desc id="desc">A restrained dark editorial illustration linking an agent identity card through a verified connection to a browser window.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
